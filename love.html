<!DOCTYPE html>
<html>
<head>
    <title>For Varsha ❤️</title>

    <style>
        body {
            text-align: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #ff6a88, #ff99ac);
            color: white;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 45px;
            margin-top: 120px;
            animation: fadeIn 2s ease-in-out;
        }

        p {
            font-size: 22px;
            margin-top: 10px;
            animation: fadeIn 3s ease-in-out;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin: 20px;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: #28a745;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #dc3545;
            color: white;
            position: absolute;
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            color: #ffdde1;
            font-size: 20px;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

    <h1>Varsha 💖</h1>
    <p>You are the most beautiful part of my life 😍</p>
    <p>Will you be mine forever? ❤️</p>

    <button id="yesBtn" onclick="yesClick()">Yes 💍</button>
    <button id="noBtn" onmouseover="moveNo()">No 😢</button>

    <script>
        function yesClick() {
            document.body.innerHTML = `
                <h1>💍 I Love You Varsha ❤️</h1>
                <h2>You made my life magical ✨</h2>
                <p>Forever with you 💖</p>
            `;
        }

        function moveNo() {
            let x = Math.random() * (window.innerWidth - 100);
            let y = Math.random() * (window.innerHeight - 100);

            let btn = document.getElementById("noBtn");
            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }

        // Create floating hearts
        setInterval(() => {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }, 300);
    </script>

</body>
</html>
